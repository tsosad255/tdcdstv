<!doctype html>
<html lang="vi">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="color-scheme" content="dark light" />
  <meta name="theme-color" content="#0b1020" media="(prefers-color-scheme: dark)">
  <meta name="theme-color" content="#f6f8ff" media="(prefers-color-scheme: light)">
  <title>Đang bảo trì - [Tên chủ đề trắc nghiệm]</title>
  <meta name="description" content="Hệ thống đang được bảo trì" />
  <link rel="icon" href="assets/logo.png" type="image/png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css" />
  <style>
    html {
      scroll-behavior: smooth
    }

    .maintenance-view {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 60vh;
      text-align: center;
      padding: 40px 20px;
    }

    .maintenance-card {
      max-width: 500px;
      width: 100%;
      padding: 40px 30px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
      margin: 40px auto;
      animation: fadeIn 0.5s ease-out;
    }

    .maintenance-icon {
      font-size: 5rem;
      margin-bottom: 10px;
      animation: float 3s infinite ease-in-out;
      background: linear-gradient(135deg, var(--brand), var(--accent));
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      display: inline-block;
    }

    @keyframes float {
      0% {
        transform: translateY(0);
      }

      50% {
        transform: translateY(-10px);
      }

      100% {
        transform: translateY(0);
      }
    }

    @keyframes fadeIn {
      0% {
        opacity: 0;
        transform: translateY(20px);
      }

      100% {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .maintenance-title {
      font-size: 1.8rem;
      margin: 0;
      color: var(--text);
      font-weight: 800;
      line-height: 1.3;
    }

    .maintenance-desc {
      color: var(--muted);
      line-height: 1.6;
      font-size: 1.05rem;
      margin: 0;
    }

    .contact-info {
      margin-top: 10px;
      padding-top: 20px;
      border-top: 1px solid rgba(148, 163, 184, 0.15);
      font-size: 0.95rem;
      color: var(--muted);
      width: 100%;
    }
  </style>
</head>

<body>
  <header class="app-header" role="banner">
    <div class="brand">
      <img src="assets/logo.png" alt="" class="logo" onerror="this.style.display='none'" />
      <div>
        <h1>[Tên chủ đề trắc nghiệm]</h1>
        <p class="subtitle"><em>Hệ thống trắc nghiệm</em></p>
      </div>
    </div>
    <div class="header-right">
      <button id="btnTheme" class="btn btn-ghost" title="Đổi giao diện (sáng/tối)"
        aria-label="Đổi giao diện">🌓</button>
    </div>
  </header>

  <main class="view current" role="main">
    <section class="card maintenance-card">
      <div class="maintenance-icon">🛠️</div>
      <h2 class="maintenance-title">Hệ thống đang bảo trì</h2>
      <p class="maintenance-desc">
        Chúng tôi đang tạm ngừng hệ thống để thực hiện nâng cấp và cải thiện trải nghiệm.<br><br>
        Vui lòng quay lại sau nhé! Cảm ơn sự kiên nhẫn của bạn.
      </p>
      <div class="contact-info">
        Nếu có thắc mắc khẩn cấp, vui lòng liên hệ Ban tổ chức.
      </div>
    </section>
  </main>

  <footer class="app-footer" role="contentinfo">
    <div style="width: 100%; text-align: center;">© <span id="year"></span> Khoa KHXH&NT</div>
  </footer>

  <script>
    // Theme logic logic
    const btnTheme = document.getElementById('btnTheme');
    const root = document.documentElement;

    const savedTheme = localStorage.getItem('theme');
    const systemPrefersLight = window.matchMedia('(prefers-color-scheme: light)').matches;

    if (savedTheme === 'light' || (!savedTheme && systemPrefersLight)) {
      root.classList.add('light');
    }

    btnTheme.addEventListener('click', () => {
      root.classList.toggle('light');
      const isLight = root.classList.contains('light');
      localStorage.setItem('theme', isLight ? 'light' : 'dark');
      document.querySelector('meta[name="theme-color"][media="(prefers-color-scheme: dark)"]').setAttribute('content', isLight ? '#f6f8ff' : '#0b1020');
      document.querySelector('meta[name="theme-color"][media="(prefers-color-scheme: light)"]').setAttribute('content', isLight ? '#f6f8ff' : '#0b1020');
    });

    document.getElementById('year').textContent = new Date().getFullYear();
  </script>
</body>

</html>
